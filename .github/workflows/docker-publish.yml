# =============================================================================
# virtual-db/mysql — .github/workflows/docker-publish.yml
#
# Builds the vdb-mysql Docker image and publishes it to the GitHub Container
# Registry (ghcr.io) whenever a release is published on GitHub.
#
# Image: ghcr.io/virtual-db/mysql
# Tags:
#   - Full semver:     ghcr.io/virtual-db/mysql:v0.0.1-alpha.2
#   - Major.minor:     ghcr.io/virtual-db/mysql:v0.0  (stable releases only)
#   - latest:          ghcr.io/virtual-db/mysql:latest (stable releases only)
#
# Required repository secret:
#   GO_PRIVATE_TOKEN — a GitHub PAT with read access to AnqorDX/dispatch and
#                      AnqorDX/pipeline. Used inside the Docker build to fetch
#                      those private Go modules via go mod download.
#                      If both repos are public this secret is still required
#                      but its value can be the default GITHUB_TOKEN.
# =============================================================================

name: Publish Docker image to GHCR

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Exact release tag — always applied (e.g. v0.0.1-alpha.2)
            type=ref,event=tag
            # SemVer rules — major.minor and latest only for stable releases
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Pass the PAT as a BuildKit secret so git can fetch private Go
          # modules inside the build. The secret is never written to any layer.
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.GO_PRIVATE_TOKEN }}
          # Cache layers in the GHCR cache to speed up subsequent builds.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
