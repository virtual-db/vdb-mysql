name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        run: go test -race ./...

  build:
    name: Build (linux/amd64)
    needs: test
    runs-on: ubuntu-latest
    env:
      GOOS: linux
      GOARCH: amd64
      CGO_ENABLED: 0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o vdb-mysql-linux-amd64 .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vdb-mysql-linux-amd64
          path: vdb-mysql-linux-amd64
          retention-days: 7

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vdb-mysql-linux-amd64
      - name: Attach binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: vdb-mysql-linux-amd64
